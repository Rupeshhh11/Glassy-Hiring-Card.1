<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hiring Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">

        <div class="card-content">

            <div class="visual-area">
                <img src="https://i.ibb.co/pv1r87vj/Adobe-Express-file.png" class="blocks-image">
                <div class="blur"></div>
                <div class="blur2"></div>

                <div class="dashed-line line-left"></div>
                <div class="dashed-line line-right"></div>


            </div>

            <div class="text-content">
                <div class="title">Smart hiring starts with one link</div>
                <p class="subtitle">Share a link — receive voice <br>
                    answers, instantly scored.</p>
            </div>
        </div>
    </div>

</body>

</html>
